<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" role="img" aria-label="Corredor tatico contaminado">
  <defs>
    <linearGradient id="floor" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17202a"/>
      <stop offset="0.45" stop-color="#222b31"/>
      <stop offset="1" stop-color="#0c1117"/>
    </linearGradient>
    <linearGradient id="route" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#26343b"/>
      <stop offset="0.5" stop-color="#39474a"/>
      <stop offset="1" stop-color="#1a2428"/>
    </linearGradient>
    <pattern id="plateGrid" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="none"/>
      <path d="M100 0H0v100" fill="none" stroke="#65717a" stroke-opacity=".16" stroke-width="3"/>
      <path d="M8 8h84v84H8z" fill="none" stroke="#03070b" stroke-opacity=".28" stroke-width="2"/>
    </pattern>
    <pattern id="noise" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M12 25h18M72 16h28M45 71h16M94 93h12M18 105h34" stroke="#d7e0d7" stroke-opacity=".07" stroke-width="5" stroke-linecap="round"/>
      <circle cx="22" cy="72" r="3" fill="#a3b1a8" fill-opacity=".08"/>
      <circle cx="82" cy="48" r="2" fill="#a3b1a8" fill-opacity=".08"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000" flood-opacity=".45"/>
    </filter>
  </defs>

  <rect width="1000" height="1000" fill="url(#floor)"/>
  <rect width="1000" height="1000" fill="url(#plateGrid)"/>
  <rect width="1000" height="1000" fill="url(#noise)"/>

  <rect x="0" y="400" width="800" height="200" fill="url(#route)" filter="url(#softShadow)"/>
  <path d="M0 400h800M0 600h800" stroke="#8ba39b" stroke-opacity=".22" stroke-width="7"/>
  <path d="M70 500h70m80 0h70m80 0h70m80 0h70m80 0h70" stroke="#d1fae5" stroke-opacity=".18" stroke-width="12" stroke-linecap="round" stroke-dasharray="34 46"/>

  <g opacity=".82">
    <rect x="214" y="214" width="122" height="122" rx="10" fill="#15191b" stroke="#38424a" stroke-width="5"/>
    <path d="M238 245h74M238 276h74M238 307h74" stroke="#59636b" stroke-width="8" stroke-linecap="round"/>
    <rect x="222" y="662" width="118" height="118" rx="10" fill="#15191b" stroke="#38424a" stroke-width="5"/>
    <path d="M248 686l66 66M314 686l-66 66" stroke="#6f5a38" stroke-width="10" stroke-linecap="round"/>
    <path d="M690 668h120l52 58-52 58H690z" fill="#171d20" stroke="#4b5560" stroke-width="5"/>
    <path d="M720 704h72M720 738h72" stroke="#efb54a" stroke-opacity=".52" stroke-width="10" stroke-linecap="round"/>
  </g>

  <g opacity=".75">
    <path d="M820 90h120v260H820z" fill="#11171b" stroke="#303b44" stroke-width="8"/>
    <path d="M850 130h60M850 172h60M850 214h60M850 256h60" stroke="#5f6b74" stroke-width="12" stroke-linecap="round"/>
    <path d="M856 816c38-18 78-18 120 0" fill="none" stroke="#11171b" stroke-width="54" stroke-linecap="round"/>
    <path d="M856 816c38-18 78-18 120 0" fill="none" stroke="#53606a" stroke-width="10" stroke-linecap="round"/>
  </g>

  <g opacity=".48">
    <circle cx="105" cy="725" r="44" fill="#122018"/>
    <circle cx="105" cy="725" r="25" fill="#31513c"/>
    <path d="M82 708l46 36M128 708l-46 36" stroke="#8fbf7d" stroke-opacity=".36" stroke-width="7" stroke-linecap="round"/>
    <path d="M430 182c44 8 80 31 108 69" fill="none" stroke="#eab308" stroke-opacity=".24" stroke-width="14" stroke-linecap="round"/>
    <path d="M452 795c64-22 117-19 159 8" fill="none" stroke="#ef4444" stroke-opacity=".16" stroke-width="20" stroke-linecap="round"/>
  </g>

  <rect width="1000" height="1000" fill="none" stroke="#020617" stroke-width="26"/>
  <rect width="1000" height="1000" fill="url(#plateGrid)" opacity=".28"/>
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="0" stop-color="#000" stop-opacity="0"/>
    <stop offset="0.65" stop-color="#000" stop-opacity=".12"/>
    <stop offset="1" stop-color="#000" stop-opacity=".58"/>
  </radialGradient>
  <rect width="1000" height="1000" fill="url(#vignette)"/>
</svg>
