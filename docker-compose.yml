services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: codesurvivor:latest
    container_name: codesurvivor
    restart: unless-stopped
    env_file:
      - .env.docker
    # Sem porta exposta ao host — acesso exclusivo via rede interna Docker (proxy)
    volumes:
      - app_storage:/var/www/html/storage

  proxy:
    image: nginx:1.27-alpine
    container_name: codesurvivor-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  app_storage:
